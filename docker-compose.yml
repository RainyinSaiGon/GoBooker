services:
  roach1:
    image: cockroachdb/cockroach:v26.2.3
    hostname: roach1
    command: >
      start
      --insecure
      --advertise-addr=roach1:26257
      --http-addr=0.0.0.0:8080
      --listen-addr=0.0.0.0:26257
      --join=roach1:26257,roach2:26257,roach3:26257
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - roach1:/cockroach/cockroach-data
    networks:
      - roachnet

  roach2:
    image: cockroachdb/cockroach:v26.2.3
    hostname: roach2
    command: >
      start
      --insecure
      --advertise-addr=roach2:26257
      --http-addr=0.0.0.0:8080
      --listen-addr=0.0.0.0:26257
      --join=roach1:26257,roach2:26257,roach3:26257
    ports:
      - "26258:26257" # Maps host 26258 to container 26257
      - "8081:8080"  # Maps host 8081 to container 8080
    volumes:
      - roach2:/cockroach/cockroach-data
    networks:
      - roachnet

  roach3:
    image: cockroachdb/cockroach:v26.2.3
    hostname: roach3
    command: >
      start
      --insecure
      --advertise-addr=roach3:26257
      --http-addr=0.0.0.0:8080
      --listen-addr=0.0.0.0:26257
      --join=roach1:26257,roach2:26257,roach3:26257
    ports:
      - "26259:26257" # Maps host 26259 to container 26257
      - "8082:8080"  # Maps host 8082 to container 8080
    volumes:
      - roach3:/cockroach/cockroach-data
    networks:
      - roachnet

  cockroach-init:
    image: cockroachdb/cockroach:v26.2.3
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "cockroach init --insecure --host=roach1:26257 ||
      (echo 'Cluster already initialized, continuing...' && exit 0)"
    depends_on:
      - roach1
      - roach2
      - roach3
    networks:
      - roachnet
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 8081
      DATABASE_URL: postgresql://root@roach1:26257/defaultdb?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
    ports:
      - "3001:8081"
    depends_on:
      cockroach-init:
        condition: service_completed_successfully # Ensures init finishes before backend starts
    networks:
      - roachnet
    restart: on-failure

volumes:
  roach1:
    name: roach1
  roach2:
    name: roach2
  roach3:
    name: roach3

networks:
  roachnet:
    name: roachnet